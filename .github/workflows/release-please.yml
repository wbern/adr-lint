name: release-please

on:
  push:
    branches: [main]

# Permissions still listed for documentation, but release-please uses the PAT
# (RELEASE_PLEASE_TOKEN) so its tag push fires the release.yml workflow.
# Tags pushed by GITHUB_TOKEN do not trigger downstream workflows.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.rp.outputs.pr }}
      release_created: ${{ steps.rp.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  auto-merge:
    # Trunk-based: squash-merge any open Release PR immediately.
    # The PR exists only as a one-step staging area, not a review gate.
    # We look it up by label rather than relying on release-please's `pr`
    # output, because that output is empty on runs where release-please
    # didn't update the PR (e.g. first run after switching tokens).
    needs: release-please
    if: ${{ !needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          pr_number=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "autorelease: pending" \
            --json number --jq '.[0].number')
          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "No open release PR to merge."
            exit 0
          fi
          # Direct squash-merge. The Release PR only touches CHANGELOG.md and
          # the manifest — code already passed CI on main before reaching here.
          gh pr merge "$pr_number" \
            --repo "$GITHUB_REPOSITORY" \
            --squash
