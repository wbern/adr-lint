# golangci-lint config (v2 schema). Run with: golangci-lint run (from go/).
#
# Philosophy: enable the standard quality linters, plus a few opinionated ones
# that catch bugs gofmt/vet miss. Avoid stylistic linters that just bikeshed.

version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - errcheck       # unchecked error returns
    - govet          # the standard go vet
    - ineffassign    # ineffectual assignments
    - staticcheck    # broad static analysis (subsumes gosimple in v2)
    - unused         # dead code
    - misspell       # typos in comments/strings
    - unconvert      # unnecessary type conversions
    - bodyclose      # missed resp.Body.Close()
    - errorlint      # errors.Is / errors.As correctness
  exclusions:
    rules:
      # Test files often need long functions and intentionally simple errors.
      - path: _test\.go
        linters:
          - errcheck
          - errorlint

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/wbern/adr-lint
