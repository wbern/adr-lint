# golangci-lint config. Run with: golangci-lint run (from the go/ directory).
#
# Philosophy: enable the standard quality linters, plus a few opinionated ones
# that catch bugs gofmt/vet miss. Avoid stylistic linters that just bikeshed.

run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck       # unchecked error returns
    - gosimple       # simplifications
    - govet          # the standard go vet
    - ineffassign    # ineffectual assignments
    - staticcheck    # broad static analysis
    - unused         # dead code
    - gofmt          # formatting
    - goimports      # import grouping
    - misspell       # typos in comments/strings
    - unconvert      # unnecessary type conversions
    - bodyclose      # missed resp.Body.Close()
    - errorlint      # errors.Is / errors.As correctness

linters-settings:
  goimports:
    local-prefixes: github.com/wbern/adr-lint

issues:
  exclude-rules:
    # Test files often need long functions and intentionally simple errors.
    - path: _test\.go
      linters:
        - errcheck
        - errorlint
